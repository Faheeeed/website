<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Train With Faheed</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(180deg, #0a0a0a, #111);
            color: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .card {
            background: rgba(20, 20, 20, 0.95);
            padding: 50px 40px;
            border-radius: 16px;
            width: 360px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.05);
        }

        h1 {
            margin-bottom: 10px;
            font-size: 28px;
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: 14px;
            color: #aaaaaa;
            margin-bottom: 30px;
        }

        .cta {
            font-size: 16px;
            margin-bottom: 20px;
            color: #dddddd;
        }

        .button {
            display: inline-block;
            padding: 14px 26px;
            background: linear-gradient(135deg, #E1306C, #ff4d88);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.25s ease;
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(225, 48, 108, 0.4);
        }

        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #777;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Train With Faheed</h1>
    <div class="subtitle">Online Coaching • Fitness • Transformation</div>

    <div class="cta">
        Ready to take your fitness to the next level?
        <br><br>
        Send me a direct message on Instagram to get started.
    </div>

    <a class="button" href="https://www.instagram.com/trainwithfaheed" target="_blank">
        Message Me on Instagram
    </a>

    <div class="footer">
        © 2026 Train With Faheed
    </div>
</div>

</body>
</html>
